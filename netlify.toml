[build]
  publish = "dist"
  command = "npm run build"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.paystack.co https://unpkg.com https://*.paystack.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.paystack.com https://paystack.com https://js.paystack.co https://unpkg.com; font-src 'self' data: https://fonts.gstatic.com https://unpkg.com https://*.paystack.com; frame-src 'self' https://paystack.com https://*.paystack.com https://checkout.paystack.com; connect-src 'self' https://chop-spot.onrender.com https://delichops-backend-akuq.onrender.com https://api.paystack.co https://*.paystack.co https://*.paystack.com https://checkout.paystack.com https://api.geoapify.com https://nominatim.openstreetmap.org https://api.cloudinary.com https://unpkg.com; img-src 'self' data: blob: https:; worker-src blob:; object-src 'none';"
